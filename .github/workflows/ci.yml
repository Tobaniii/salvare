name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lightweight verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --run

      - name: TypeScript type check
        run: npx tsc -b

      - name: Build server bundle
        run: npm run build:server

      - name: Build extension bundle
        run: npm run build:extension

      - name: Verify store profiles
        run: npm run profiles:verify
